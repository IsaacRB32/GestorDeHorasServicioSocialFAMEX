<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Prestadores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/famex-ui.js"></script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <famex-sidebar></famex-sidebar>

        <main class="flex-1 p-8 overflow-y-auto">
            <div class="bg-white p-5 rounded-xl shadow-sm mb-8 border border-gray-100 flex flex-col xl:flex-row justify-between items-center gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Seguimiento Meso-Mensual</h2>
                    <p class="text-sm text-gray-500 mt-1">Gestión de horas, faltas y justificaciones</p>
                </div>
                
                <div class="flex items-center space-x-3 bg-gray-50 p-1.5 rounded-lg border border-gray-200">
                    <button onclick="cambiarMes(-1)" class="px-3 py-1 bg-white rounded shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold transition">&lt;</button>
                    <span id="labelMesActual" class="font-bold w-36 text-center text-gray-700 uppercase tracking-wide text-sm">Mayo 2026</span>
                    <button onclick="cambiarMes(1)" class="px-3 py-1 bg-white rounded shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold transition">&gt;</button>
                </div>

                <div class="flex space-x-4">
                    <input type="text" id="buscarNombre" placeholder="Buscar prestador..." class="border border-gray-300 pl-4 pr-4 py-2 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="filtroDepto" class="border border-gray-300 p-2 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Todos">Todos los departamentos</option>
                        <option value="LOGISTICA">Logística</option>
                        <option value="OPERACIONES">Operaciones</option>
                        <option value="COMERCIAL">Comercial</option>
                        <option value="PUBLICIDAD">Publicidad</option>
                        <option value="RELACIONES PUBLICAS">Relaciones Públicas</option>
                    </select>
                </div>
            </div>

            <div id="contenedorTarjetas" class="grid grid-cols-1 xl:grid-cols-2 gap-8">
            </div>
        </main>
    </div>

    <div id="modalEdicion" class="fixed inset-0 bg-slate-900 bg-opacity-60 hidden flex justify-center items-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-[460px] max-w-[95vw]">

            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-black text-gray-800" id="modalTitulo">Editar Día</h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-red-500 font-bold text-2xl leading-none">&times;</button>
            </div>

            <input type="hidden" id="modalId">
            <input type="hidden" id="modalFecha">

            <!-- Tabs principales -->
            <div class="grid grid-cols-3 gap-2 mb-5">
                <button id="tabFalta" onclick="seleccionarTab('Falta')"
                    class="py-2.5 px-2 rounded-xl text-sm font-black border-2 transition-all">
                    ✗ Falta
                </button>
                <button id="tabJustificante" onclick="seleccionarTab('Justificante')"
                    class="py-2.5 px-2 rounded-xl text-sm font-black border-2 transition-all">
                    📋 Justificante
                </button>
                <button id="tabHoras" onclick="seleccionarTab('Horas')"
                    class="py-2.5 px-2 rounded-xl text-sm font-black border-2 transition-all">
                    ⏱ Agregar Horas
                </button>
            </div>

            <!-- Panel: Falta -->
            <div id="panelFalta" class="mb-5 hidden">
                <div class="bg-red-50 border-2 border-red-200 rounded-xl p-5 text-center">
                    <div class="text-3xl mb-2">✗</div>
                    <p class="font-black text-red-700">Falta Injustificada</p>
                    <p class="text-xs text-red-400 mt-1">Se guardarán 0 horas para este día</p>
                </div>
            </div>

            <!-- Panel: Justificante -->
            <div id="panelJustificante" class="mb-5 hidden">
                <div class="bg-amber-50 border-2 border-amber-200 rounded-xl p-5 text-center">
                    <div class="text-3xl mb-2">📋</div>
                    <p class="font-black text-amber-700">Justificante / Permiso</p>
                    <p class="text-xs text-amber-400 mt-1">Se guardarán 0 horas para este día</p>
                </div>
            </div>

            <!-- Panel: Agregar Horas -->
            <div id="panelHoras" class="mb-5 hidden">
                <div class="flex gap-2 mb-4">
                    <label id="labelManual" class="flex-1 flex items-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all">
                        <input type="radio" name="metodoCaptura" value="manual" onchange="seleccionarMetodo('manual')">
                        <span class="text-sm font-bold">Ingreso Manual</span>
                    </label>
                    <label id="labelRango" class="flex-1 flex items-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all">
                        <input type="radio" name="metodoCaptura" value="rango" onchange="seleccionarMetodo('rango')">
                        <span class="text-sm font-bold">Rango de Tiempo</span>
                    </label>
                </div>

                <!-- Sub-panel: Manual -->
                <div id="subManual">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Horas Trabajadas</label>
                    <input type="number" id="inputManualHoras" step="0.5" min="0" max="24"
                        class="border-2 border-gray-200 focus:border-blue-500 p-3 rounded-xl w-full font-black text-2xl text-center text-gray-800 bg-gray-50 focus:outline-none transition-colors">
                </div>

                <!-- Sub-panel: Rango -->
                <div id="subRango" class="hidden">
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Hora de Inicio</label>
                            <input type="time" id="inputInicio" oninput="calcularRango()"
                                class="border-2 border-gray-200 focus:border-blue-500 p-3 rounded-xl w-full font-bold text-gray-800 bg-gray-50 focus:outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Hora de Fin</label>
                            <input type="time" id="inputFin" oninput="calcularRango()"
                                class="border-2 border-gray-200 focus:border-blue-500 p-3 rounded-xl w-full font-bold text-gray-800 bg-gray-50 focus:outline-none transition-colors">
                        </div>
                    </div>
                    <div id="resultadoCalculo" class="hidden bg-blue-50 border-2 border-blue-200 rounded-xl p-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-500">Exacto: <span id="horasExactas" class="font-bold text-gray-700">0</span> h</span>
                            <span class="text-blue-400 font-black">→</span>
                            <span class="text-sm text-gray-500">Redondeado: <span id="horasRedondeadas" class="font-black text-blue-700 text-xl">0</span> h</span>
                        </div>
                        <p class="text-center text-xs text-blue-400 mt-1" id="reglaAplicada"></p>
                    </div>
                    <div id="errorRango" class="hidden bg-red-50 border border-red-200 rounded-xl p-2 text-center text-xs text-red-600 font-bold mt-1">
                        La hora de fin debe ser posterior a la de inicio
                    </div>
                </div>
            </div>

            <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
                <button onclick="cerrarModal()" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 font-bold transition">Cancelar</button>
                <button onclick="guardarEdicion()" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold shadow-lg shadow-blue-200 transition transform hover:-translate-y-0.5">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script src="js/seguimiento.js"></script>

</body>
</html>
