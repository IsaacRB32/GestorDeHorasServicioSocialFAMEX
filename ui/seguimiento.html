<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento de Prestadores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6 shadow-xl z-10">
            <h1 class="text-xl font-bold mb-10 tracking-wider">FAMEX <span class="text-blue-400">Control</span></h1>
            <nav class="space-y-2">
                <a href="index.html" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Panel de Carga</a>
                <a href="prestadores.html" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Directorio</a>
                <a href="#" class="block py-2.5 px-4 rounded bg-blue-600 font-semibold shadow">Expedientes</a>
                <a href="analitica.html" class="block py-2.5 px-4 rounded transition hover:bg-slate-700">Analítica Global</a> </nav>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div class="bg-white p-5 rounded-xl shadow-sm mb-8 border border-gray-100 flex flex-col xl:flex-row justify-between items-center gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Seguimiento Meso-Mensual</h2>
                    <p class="text-sm text-gray-500 mt-1">Gestión de horas, faltas y justificaciones</p>
                </div>
                
                <div class="flex items-center space-x-3 bg-gray-50 p-1.5 rounded-lg border border-gray-200">
                    <button onclick="cambiarMes(-1)" class="px-3 py-1 bg-white rounded shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold transition">&lt;</button>
                    <span id="labelMesActual" class="font-bold w-36 text-center text-gray-700 uppercase tracking-wide text-sm">Mayo 2026</span>
                    <button onclick="cambiarMes(1)" class="px-3 py-1 bg-white rounded shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold transition">&gt;</button>
                </div>

                <div class="flex space-x-4">
                    <input type="text" id="buscarNombre" placeholder="Buscar prestador..." class="border border-gray-300 pl-4 pr-4 py-2 rounded-lg w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="filtroDepto" class="border border-gray-300 p-2 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Todos">Todos los departamentos</option>
                        <option value="LOGISTICA">Logística</option>
                        <option value="OPERACIONES">Operaciones</option>
                        <option value="COMERCIAL">Comercial</option>
                        <option value="PUBLICIDAD">Publicidad</option>
                        <option value="RELACIONES PUBLICAS">Relaciones Públicas</option>
                    </select>
                </div>
            </div>

            <div id="contenedorTarjetas" class="grid grid-cols-1 xl:grid-cols-2 gap-8">
            </div>
        </main>
    </div>

    <div id="modalEdicion" class="fixed inset-0 bg-slate-900 bg-opacity-60 hidden flex justify-center items-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 transform scale-100 transition-transform">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-black text-gray-800" id="modalTitulo">Editar Día</h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-red-500 font-bold text-xl">&times;</button>
            </div>
            
            <input type="hidden" id="modalId">
            <input type="hidden" id="modalFecha">

            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">Horas Trabajadas</label>
                <input type="number" step="0.1" id="modalHoras" class="border border-gray-300 p-3 rounded-lg w-full focus:ring-2 focus:ring-blue-500 font-bold text-lg text-gray-800 bg-gray-50">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Estatus del Día</label>
                <select id="modalEstatus" class="p-3 rounded-lg w-full font-bold focus:outline-none focus:ring-2 focus:ring-blue-500 border appearance-none cursor-pointer transition-colors" onchange="cambiarColorSelect()">
                    <option value="Asistencia">Asistencia (Horas Normales)</option>
                    <option value="Falta">Falta Injustificada</option>
                    <option value="Justificante">Justificante / Permiso</option>
                </select>
            </div>

            <div class="flex justify-end space-x-3 mt-8">
                <button onclick="cerrarModal()" class="px-5 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-bold transition">Cancelar</button>
                <button onclick="guardarEdicion()" class="px-5 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-lg shadow-blue-200 transition transform hover:-translate-y-0.5">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <script>
        let datosGlobales = [];
        let fechaActual = new Date(2026, 4, 1); 
        const mesesNombres = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        async function cargarSeguimiento() {
            const response = await fetch('/api/seguimiento-datos');
            datosGlobales = await response.json();
            renderizarCalendarios();
        }

        function cambiarMes(direccion) {
            fechaActual.setMonth(fechaActual.getMonth() + direccion);
            renderizarCalendarios();
        }

        function renderizarCalendarios() {
            let year = fechaActual.getFullYear();
            let month = fechaActual.getMonth();
            
            document.getElementById('labelMesActual').innerText = `${mesesNombres[month]} ${year}`;
            
            const contenedor = document.getElementById('contenedorTarjetas');
            contenedor.innerHTML = "";

            let primerDiaDelMes = new Date(year, month, 1).getDay();
            let diasEnElMes = new Date(year, month + 1, 0).getDate();
            
            let offset = primerDiaDelMes === 0 ? 6 : primerDiaDelMes - 1;

            datosGlobales.forEach(prestador => {
                let diasHtml = "";
                let huecosLaborales = offset > 4 ? 0 : offset; 
                for(let i=0; i < huecosLaborales; i++) {
                    diasHtml += `<div class="bg-gray-100 border-b border-r border-gray-200 opacity-40 h-16"></div>`;
                }

                for(let dia = 1; dia <= diasEnElMes; dia++) {
                    let fechaBucle = new Date(year, month, dia);
                    let diaSemana = fechaBucle.getDay();
                    
                    if (diaSemana === 0 || diaSemana === 6) continue;

                    let mesStr = String(month + 1).padStart(2, '0');
                    let diaStr = String(dia).padStart(2, '0');
                    let fechaISO = `${year}-${mesStr}-${diaStr}`;
                    
                    let registro = prestador.registros.find(r => r.fecha === fechaISO);
                    
                    let horas = registro ? registro.horas : 0;
                    let estatus = registro ? registro.estatus : 'Vacio';
                    
                    let bgClass = "bg-white hover:bg-gray-50 text-gray-300";
                    let textHtml = `<span class="text-lg">-</span>`;

                    if (registro && horas > 0) {
                        bgClass = "bg-green-50 hover:bg-green-100 text-green-700";
                        textHtml = `<span class="text-xl font-black">${horas}</span><span class="text-xs font-bold ml-0.5 opacity-70">h</span>`;
                    } else if (estatus === "Falta") {
                        bgClass = "bg-red-50 hover:bg-red-100";
                        textHtml = `<span class="text-xs font-bold text-red-600 tracking-wider">FALTA</span>`;
                    } else if (estatus === "Justificante") {
                        bgClass = "bg-yellow-50 hover:bg-yellow-100";
                        textHtml = `<span class="text-[10px] font-bold text-yellow-700 tracking-wider">JUSTIF.</span>`;
                    }

                    diasHtml += `
                        <div class="${bgClass} relative h-16 flex flex-col justify-center items-center cursor-pointer transition-colors group border-b border-r border-gray-200" onclick="abrirEdicion(${prestador.id}, '${fechaISO}')">
                            <span class="absolute top-1 left-1.5 text-[10px] font-bold text-gray-400 group-hover:text-gray-600">${dia}</span>
                            ${textHtml}
                            <div class="absolute inset-0 border-2 border-transparent group-hover:border-blue-400 pointer-events-none transition-all"></div>
                        </div>
                    `;
                }

                let porcentaje = Math.min((prestador.horas_totales / 480) * 100, 100).toFixed(1);

                let tarjeta = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden prestador-card" data-depto="${prestador.departamento}" data-nombre="${prestador.nombre.toLowerCase()}">
                    <div class="p-5 border-b border-gray-100 bg-slate-50 flex justify-between items-center">
                        <div>
                            <div class="text-xs font-bold text-blue-600 tracking-wider mb-1">${prestador.departamento}</div>
                            <h3 class="text-lg font-black text-gray-800 leading-tight">${prestador.nombre}</h3>
                            <p class="text-xs text-gray-500 font-medium mt-0.5">ID Checador: ${prestador.id}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-black text-gray-800">${prestador.horas_totales}<span class="text-sm font-medium text-gray-400 ml-1">/ 480h</span></div>
                        </div>
                    </div>

                    <div class="p-5">
                        <div class="flex justify-between items-end mb-4">
                            <div class="w-1/2">
                                <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
                                    <span>Progreso Global</span>
                                    <span>${porcentaje}%</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-blue-500 h-2 rounded-full" style="width: ${porcentaje}%"></div>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                <span class="bg-red-50 text-red-600 border border-red-100 px-2.5 py-1 rounded text-xs font-bold">Faltas: ${prestador.faltas}</span>
                                <span class="bg-yellow-50 text-yellow-700 border border-yellow-100 px-2.5 py-1 rounded text-xs font-bold">Justificantes: ${prestador.justificantes}</span>
                            </div>
                        </div>

                        <div class="border-t border-l border-gray-200 rounded overflow-hidden">
                            <div class="grid grid-cols-5 bg-gray-100 border-b border-gray-200 text-[10px] font-black text-gray-500 uppercase tracking-wider">
                                <div class="py-2 text-center border-r border-gray-200">Lun</div>
                                <div class="py-2 text-center border-r border-gray-200">Mar</div>
                                <div class="py-2 text-center border-r border-gray-200">Mié</div>
                                <div class="py-2 text-center border-r border-gray-200">Jue</div>
                                <div class="py-2 text-center border-r border-gray-200">Vie</div>
                            </div>
                            <div class="grid grid-cols-5 bg-gray-200">
                                ${diasHtml}
                            </div>
                        </div>
                    </div>
                </div>`;
                contenedor.innerHTML += tarjeta;
            });
            
            aplicarFiltros(); 
        }

        document.getElementById('buscarNombre').addEventListener('input', aplicarFiltros);
        document.getElementById('filtroDepto').addEventListener('change', aplicarFiltros);

        function aplicarFiltros() {
            let txt = document.getElementById('buscarNombre').value.toLowerCase();
            let depto = document.getElementById('filtroDepto').value;
            let tarjetas = document.querySelectorAll('.prestador-card');

            tarjetas.forEach(t => {
                let matchNombre = t.getAttribute('data-nombre').includes(txt);
                let matchDepto = depto === "Todos" || t.getAttribute('data-depto') === depto;
                t.style.display = (matchNombre && matchDepto) ? "block" : "none";
            });
        }

        function abrirEdicion(id, fechaExacta) {
            document.getElementById('modalEdicion').classList.remove('hidden');
            
            let f = new Date(fechaExacta + 'T12:00:00'); 
            document.getElementById('modalTitulo').innerText = `${f.getDate()} de ${mesesNombres[f.getMonth()]}`;
            
            document.getElementById('modalId').value = id;
            document.getElementById('modalFecha').value = fechaExacta;

            // FIX: Forzar la búsqueda por ID de forma numérica para evitar fallos de tipo de dato
            let prestador = datosGlobales.find(p => parseInt(p.id) === parseInt(id));
            let registro = prestador ? prestador.registros.find(r => r.fecha === fechaExacta) : null;

            let inputHoras = document.getElementById('modalHoras');
            let selectEstatus = document.getElementById('modalEstatus');

            if (registro) {
                inputHoras.value = registro.horas;
                selectEstatus.value = registro.estatus;
            } else {
                inputHoras.value = 0;
                selectEstatus.value = 'Falta';
            }
            
            cambiarColorSelect();
        }

        function cerrarModal() {
            document.getElementById('modalEdicion').classList.add('hidden');
        }

        function cambiarColorSelect() {
            let select = document.getElementById('modalEstatus');
            let baseClasses = "p-3 rounded-lg w-full font-bold focus:outline-none focus:ring-2 border appearance-none cursor-pointer transition-colors ";
            
            if(select.value === 'Falta') {
                select.className = baseClasses + "bg-red-50 text-red-700 border-red-300 focus:ring-red-500";
            } else if(select.value === 'Justificante') {
                select.className = baseClasses + "bg-yellow-50 text-yellow-700 border-yellow-300 focus:ring-yellow-500";
            } else {
                select.className = baseClasses + "bg-green-50 text-green-700 border-green-300 focus:ring-green-500";
            }
        }

        async function guardarEdicion() {
            const data = {
                id_checador: parseInt(document.getElementById('modalId').value),
                fecha: document.getElementById('modalFecha').value,
                horas: parseFloat(document.getElementById('modalHoras').value),
                estatus: document.getElementById('modalEstatus').value
            };

            try {
                const res = await fetch('/api/actualizar-dia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if(res.ok) {
                    cerrarModal();
                    cargarSeguimiento(); 
                }
            } catch (error) {
                console.error("Error al guardar en la BD:", error);
                alert("Hubo un error al guardar los cambios.");
            }
        }

        cargarSeguimiento();
    </script>
</body>
</html>
