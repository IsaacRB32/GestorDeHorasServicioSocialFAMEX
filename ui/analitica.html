<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Semanal - FAMEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/famex-ui.js?v=11"></script>
    <link href="css/style.css?v=11" rel="stylesheet">
    <style>
        @media print {
            @page { size: letter portrait; margin: 10mm 10mm; }
            html, body { height: auto !important; margin: 0 !important; padding: 0 !important; }
            body { background: #fff !important; }
            main { height: auto !important; overflow: visible !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            #printHeader { display: block !important; text-align: center; margin-bottom: 6px; page-break-after: avoid; }
            #printHeader h1 { font-size: 11pt; font-weight: 900; margin: 0; }
            #printHeader p { font-size: 8pt; color: #555; margin: 1px 0 0; }

            #printTable { 
                display: table !important; 
                width: 100%; 
                border-collapse: collapse; 
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                font-size: 7pt;
            }
            #printTable thead { display: table-header-group; }
            #printTable tbody { display: table-row-group; }
            #printTable tr { page-break-inside: avoid; }
            
            #printTable th, #printTable td { 
                border: 0.5pt solid #333; 
                padding: 2px 3px;
                font-size: 7pt;
                text-align: center;
            }
            #printTable th { 
                background: #e2e8f0 !important; 
                font-weight: 800; 
                text-transform: uppercase; 
                font-size: 6.5pt; 
                letter-spacing: 0.3px;
                padding: 2px 2px;
            }
            #printTable td.txt-left { text-align: left; font-size: 6.5pt; font-weight: 600; }
            #printTable .depto-row td { 
                background: #f1f5f9 !important; 
                font-weight: 800; 
                text-align: left; 
                font-size: 6.5pt; 
                text-transform: uppercase; 
                letter-spacing: 0.5px; 
                border-bottom: 1.5pt solid #333;
                padding: 1.5px 2px;
            }
            #printTable .firma-col { width: 35mm; }
        }
    </style>
</head>
<body class="flex h-screen bg-slate-50 overflow-hidden">
        <!-- Sidebar (Web Component; lleva .no-print integrado) -->
        <famex-sidebar class="w-64 flex-shrink-0"></famex-sidebar>

        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Header + Filtros -->
            <div class="no-print bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100">
                <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-black text-gray-800">Registro Semanal de Firmas</h2>
                        <p class="text-sm text-gray-500 mt-1">Concentrado para recolección de firmas de conformidad</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <!-- Navegación de semana -->
                        <div class="flex items-center bg-gray-50 p-1 rounded-lg border border-gray-200">
                            <button onclick="cambiarSemana(-1)" class="px-3 py-1.5 bg-white rounded-md shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold transition text-sm">&lt;</button>
                            <div class="relative">
                                <button type="button" onclick="toggleSelectorSemana(event)" class="w-56 px-2 py-1 rounded-lg hover:bg-blue-50 transition flex items-center justify-center gap-1.5">
                                    <span id="labelSemana" class="font-bold text-sm text-gray-700">—</span>
                                    <svg class="w-3.5 h-3.5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                                </button>
                                <div id="popoverSemana" class="hidden absolute z-50 mt-2 left-1/2 -translate-x-1/2 w-72 bg-white rounded-xl shadow-lg ring-1 ring-gray-200 p-3"></div>
                            </div>
                            <button onclick="cambiarSemana(1)" class="px-3 py-1.5 bg-white rounded-md shadow-sm border border-gray-200 hover:bg-blue-50 hover:text-blue-600 font-bold transition text-sm">&gt;</button>
                        </div>
                        <button onclick="window.print()"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-5 rounded-xl transition shadow-lg shadow-emerald-200 flex items-center gap-2 text-sm transform hover:-translate-y-0.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.415 42.415 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-1.913-.247M6.34 18H5.25A2.25 2.25 0 013 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 011.913-.247m10.5 0a48.536 48.536 0 00-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18 10.5h.008v.008H18V10.5zm-3 0h.008v.008H15V10.5z"/></svg>
                            Imprimir Registro Semanal
                        </button>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-3 mt-5 pt-5 border-t border-gray-100">
                    <div class="relative flex-1">
                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" id="filtroNombre" placeholder="Buscar por nombre..."
                            class="border border-gray-200 pl-10 pr-4 py-2.5 rounded-xl w-full focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <select id="filtroDepto" class="border border-gray-200 p-2.5 rounded-xl bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm min-w-[200px]">
                        <option value="Todos">Todos los departamentos</option>
                        <option value="LOGISTICA">Logística</option>
                        <option value="OPERACIONES">Operaciones</option>
                        <option value="COMERCIAL">Comercial</option>
                        <option value="PUBLICIDAD">Publicidad</option>
                        <option value="RELACIONES PUBLICAS">Relaciones Públicas</option>
                        <option value="General">General</option>
                    </select>
                </div>
            </div>

            <!-- Concentrado visual en pantalla -->
            <div id="contenedorCards" class="no-print grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-5 mb-8"></div>
            <div id="sinDatos" class="no-print hidden py-20 text-center">
                <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <p class="text-gray-400 font-bold text-lg">Sin registros para esta semana</p>
                <p class="text-gray-300 text-sm mt-1">Ajusta los filtros o navega a otra semana</p>
            </div>

            <!-- Zona de impresión (oculta en pantalla, visible al imprimir) -->
            <div id="printHeader" class="hidden print-only">
                <h1>REGISTRO SEMANAL — SERVICIO SOCIAL (LUNES A VIERNES) — FAMEX</h1>
                <p id="printRango"></p>
            </div>
            <table id="printTable" class="hidden print-only">
                <thead>
                    <tr>
                        <th>No.</th>
                        <th>Nombre</th>
                        <th>L</th>
                        <th>M</th>
                        <th>M</th>
                        <th>J</th>
                        <th>V</th>
                        <th>Horas</th>
                        <th>Faltas</th>
                        <th class="firma-col">Firma de conformidad</th>
                    </tr>
                </thead>
                <tbody id="printBody"></tbody>
            </table>
        </main>

    <script src="js/analitica.js?v=11"></script>

</body>
</html>
