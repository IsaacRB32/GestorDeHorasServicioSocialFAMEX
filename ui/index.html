<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Asistencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6">
            <h1 class="text-xl font-bold mb-10">Control de Servicio</h1>
            <nav class="space-y-2">
                <a href="index.html" class="block py-2.5 px-4 rounded bg-slate-700">Dashboard</a>
                <a href="prestadores.html" class="block py-2.5 px-4 rounded hover:bg-slate-700">Prestadores</a>
                <a href="seguimiento.html" class="block py-2.5 px-4 rounded hover:bg-slate-700">Expedientes</a>
            </nav>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <h2 class="text-2xl font-semibold mb-6">Cargar Reporte de Asistencia</h2>
            
            <div class="bg-white p-6 rounded-lg shadow-md mb-8 border-l-4 border-blue-500">
                <input type="file" id="archivoExcel" accept=".xlsx" class="mb-4 block w-full text-sm text-gray-500"/>
                <button onclick="subirExcel()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded">Procesar Archivo</button>
                <p id="uploadStatus" class="mt-3 text-sm"></p>
            </div>

            <h2 class="text-2xl font-semibold mb-6">Estado de Prestadores</h2>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full text-left">
                    <thead class="bg-gray-800 text-white">
                        <tr>
                            <th class="py-3 px-4">ID</th>
                            <th class="py-3 px-4">Nombre</th>
                            <th class="py-3 px-4">Horas Acumuladas</th>
                        </tr>
                    </thead>
                    <tbody id="tablaResultados" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
