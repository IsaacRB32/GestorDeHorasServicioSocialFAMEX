<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Directorio de Prestadores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
    <div class="flex h-screen">
        <!-- Menú Lateral Unificado -->
        <aside class="w-64 bg-slate-900 text-white p-6 shadow-xl z-10">
            <h1 class="text-xl font-bold mb-10 tracking-wider">FAMEX <span class="text-blue-400">Control</span></h1>
            <nav class="space-y-2">
                <a href="index.html" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Panel de Carga</a>
                <a href="#" class="block py-2.5 px-4 rounded bg-slate-700 font-semibold shadow">Directorio</a>
                <a href="seguimiento.html" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Expedientes</a>
                <a href="analitica.html" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition">Analítica Global</a>
            </nav>
        </aside>

        <!-- Contenido Principal -->
        <main class="flex-1 p-8 overflow-y-auto">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800">Directorio de Prestadores</h2>
                <p class="text-sm text-gray-500 mt-1">Lista completa del personal registrado en el sistema</p>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden border border-gray-200">
                <table class="min-w-full text-left" id="tablaPrestadores">
                    <thead class="bg-gray-800 text-white text-xs uppercase tracking-wider">
                        <tr>
                            <th class="py-3 px-6">ID</th>
                            <th class="py-3 px-6">Nombre Completo</th>
                            <th class="py-3 px-6">Departamento</th> 
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 bg-white"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        async function cargarDirectorio() {
            const response = await fetch('/api/prestadores-lista');
            const lista = await response.json();
            const tbody = document.querySelector('#tablaPrestadores tbody');
            tbody.innerHTML = ''; // Limpiamos antes de llenar
                         
            lista.forEach(p => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b border-gray-200 transition-colors">
                        <td class="py-3 px-6 text-sm font-semibold text-gray-600">${p.id}</td>
                        <td class="py-3 px-6 font-bold text-gray-800">${p.nombre}</td>
                        <td class="py-3 px-6 text-gray-600 text-sm font-medium">${p.departamento}</td>
                    </tr>`;
            });
        }
        cargarDirectorio();
    </script>
</body>
</html>
